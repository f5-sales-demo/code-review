name: Self Review
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  review:
    uses: ./.github/workflows/claude-review.yml
    permissions:
      contents: read
      pull-requests: write
    secrets:
      F5_GATEWAY_TOKEN: ${{ secrets.F5_GATEWAY_TOKEN }}
      REPO_SETTINGS_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN }}
    with:
      verify_cmd: ""
